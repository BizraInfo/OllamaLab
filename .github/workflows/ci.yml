name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  CACHE_VERSION: v1

jobs:
  # Quality Assurance Job
  quality-assurance:
    name: 🔍 Quality Assurance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🧹 Lint Code
        run: npm run lint

      - name: 🎨 Check Code Formatting
        run: |
          npm install --save-dev prettier
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

  # Build Job
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: quality-assurance
    defaults:
      run:
        working-directory: ./front
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: npm run build

      - name: 📊 Bundle Analysis
        run: |
          npx vite-bundle-analyzer dist --analyze
        continue-on-error: true

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: front/dist/
          retention-days: 30

  # Security Audit Job
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: 🔒 Run Security Audit
        run: npm audit --audit-level=moderate

      - name: 🛡️ Check for Vulnerabilities
        run: |
          npx audit-ci --moderate
        continue-on-error: true

  # Deployment Job (only on main branch)
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-assurance, build, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ./front
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: front/dist/

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: front/dist
          cname: ollama-lab.example.com # Update with your domain

  # Notification Job
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [quality-assurance, build, security-audit]
    if: always()
    
    steps:
      - name: 📢 Notify Success
        if: needs.quality-assurance.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          
      - name: 📢 Notify Failure
        if: needs.quality-assurance.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "❌ CI/CD Pipeline failed. Please check the logs."
          exit 1